<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>瞬糸（SHUN-SHI）</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app-shell">
      <div id="game-frame" class="game-frame">
        <canvas id="game"></canvas>
        <div id="hud-score" class="hud-score is-hidden" aria-live="polite" aria-atomic="true">
          SCORE : <span id="hud-score-value">0</span>
        </div>
      </div>

      <!-- ゲームオーバー／ランキングと同じ fixed オーバーレイ。ボタンをビューポート基準で同サイズにする -->
      <div id="title-screen" class="screen-overlay screen-overlay--title" aria-hidden="false">
        <div class="game-frame title-screen-bounded">
          <div class="title-card">
            <h1 class="game-title">
              <span class="game-title-ja">瞬糸</span>
              <span class="game-title-en" lang="en">SHUN-SHI</span>
            </h1>
            <div class="title-actions">
              <button type="button" id="btn-game-start" class="btn btn-primary">
                ゲームスタート
              </button>
              <button type="button" id="btn-ranking" class="btn btn-secondary">ランキング</button>
            </div>
          </div>
        </div>
      </div>

      <div
        id="game-over-screen"
        class="screen-overlay screen-overlay--game-over is-hidden"
        aria-hidden="true"
      >
        <div
          class="modal-card modal-card--game-over"
          role="dialog"
          aria-modal="true"
          aria-labelledby="game-over-heading"
          tabindex="-1"
        >
          <h2 id="game-over-heading" class="modal-title">ゲームオーバー</h2>
          <p class="game-over-score">SCORE : <span id="game-over-score-value">0</span></p>
          <form id="ranking-submit-form" class="ranking-submit-form">
            <label class="ranking-submit-label" for="ranking-display-name">表示名</label>
            <input
              id="ranking-display-name"
              class="ranking-submit-input"
              name="displayName"
              type="text"
              maxlength="24"
              autocomplete="name"
              required
            />
            <button type="submit" id="btn-ranking-submit" class="btn btn-primary">
              ランキングに登録
            </button>
            <p
              id="ranking-submit-message"
              class="ranking-submit-message"
              role="status"
              aria-live="polite"
            ></p>
          </form>
          <div class="game-over-actions">
            <button type="button" id="btn-game-over-retry" class="btn btn-primary">リトライ</button>
            <button type="button" id="btn-game-over-home" class="btn btn-secondary">
              ホームへ戻る
            </button>
          </div>
        </div>
      </div>

      <div
        id="ranking-screen"
        class="screen-overlay screen-overlay--modal is-hidden"
        aria-hidden="true"
      >
        <div
          class="modal-card modal-card--ranking"
          role="dialog"
          aria-modal="true"
          aria-labelledby="ranking-heading"
          tabindex="-1"
        >
          <h2 id="ranking-heading" class="modal-title">ランキング</h2>
          <p id="ranking-status" class="ranking-status" role="status" aria-live="polite" hidden>
            読み込み中
          </p>
          <ol id="ranking-list" class="ranking-list" aria-label="ランキング一覧"></ol>
          <p id="ranking-empty" class="modal-body ranking-empty" hidden>まだ記録がありません。</p>
          <p id="ranking-error" class="modal-body ranking-error" role="alert" hidden></p>
          <div class="ranking-actions">
            <button type="button" id="btn-ranking-reload" class="btn btn-secondary">
              再読み込み
            </button>
            <button type="button" id="btn-ranking-back" class="btn btn-secondary">戻る</button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
