# Refer for explanation to following link:
# https://lefthook.dev/configuration/

pre-commit:
  parallel: true
  jobs:
    - name: oxlint
      glob: "*.{js,ts,jsx,tsx,json,jsonc}"
      run: pnpm oxlint {staged_files}

    - name: oxfmt
      glob: "*.{js,ts,jsx,tsx,json,jsonc,css,html}"
      run: pnpm oxfmt --write {staged_files} && git add {staged_files}
